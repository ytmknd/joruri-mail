## Authentication — plaintext allowed (test environment, no TLS)
disable_plaintext_auth = no
auth_mechanisms = plain login

# Append default domain when login name has no @ (e.g. "admin" → "admin@localhost.localdomain.jp")
auth_default_realm = localhost.localdomain.jp

passdb {
  driver = passwd-file
  args = /etc/dovecot/users
}

userdb {
  driver = passwd-file
  args = /etc/dovecot/users
  default_fields = uid=vmail gid=vmail home=/var/mail/vhosts/%d/%n
}
