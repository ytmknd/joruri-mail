services:
  imap:
    build:
      context: .
      dockerfile: docker/mail/Dockerfile
    hostname: imap
    ports:
      - "587:587"
      - "143:143"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "143"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db:
    image: mysql:5.7
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: jorurimail
      MYSQL_USER: joruri
      MYSQL_PASSWORD: pass
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
      - --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppass"]
      interval: 5s
      timeout: 5s
      retries: 20

  app-ubuntu26-ruby4:
    build:
      context: .
      dockerfile: docker/ubuntu26-ruby4/Dockerfile
      args:
        RUBY_VERSION: "4.0.4"
        BUNDLER_VERSION: "2.5.23"
    image: joruri-mail:phase5-ubuntu26-ruby4
    pull_policy: never
    platform: linux/amd64
    working_dir: /var/share/jorurimail
    environment:
      RAILS_ENV: development
      BUNDLE_APP_CONFIG: /var/share/jorurimail/.bundle
      BUNDLE_BIN: /var/share/jorurimail/vendor/bundle/bin
      BUNDLE_PATH: /var/share/jorurimail/vendor/bundle
      BUNDLER_VERSION: "2.5.23"
      BUNDLE_FROZEN: "true"
      CHOWN_SOURCE_TREE: "0"
      EXECJS_RUNTIME: Node
      LANG: ja_JP.UTF-8
      LC_ALL: ja_JP.UTF-8
      SECRET_KEY_BASE: 3f7dfde7386a3b01cf9a334a6273f64af7773ba3d5f6fdd8beee4dc927e3686fcb4c551c3a7e2ad4e12d5874fd8840bfbf3678f0f1d62f057f6f04e711ba43c90
      SYSTEM_TEST_HOSTS: "app-ubuntu26-ruby4"
    ports:
      - "3008:3000"
    depends_on:
      db:
        condition: service_healthy
      imap:
        condition: service_started
    volumes:
      - .:/var/share/jorurimail:cached
      - ./Gemfile.phase5.lock:/var/share/jorurimail/Gemfile.lock
      - bundle_ubuntu26_ruby4:/var/share/jorurimail/vendor/bundle
      - bundle_config_ubuntu26_ruby4:/var/share/jorurimail/.bundle
      - log_ubuntu26_ruby4:/var/share/jorurimail/log
      - public_assets_ubuntu26_ruby4:/var/share/jorurimail/public/assets
      - tmp_ubuntu26_ruby4:/var/share/jorurimail/tmp
      - upload_ubuntu26_ruby4:/var/share/jorurimail/upload
      - ./docker/phase1/config/application.yml:/var/share/jorurimail/config/application.yml:ro
      - ./docker/phase1/config/core.yml:/var/share/jorurimail/config/core.yml:ro
      - ./docker/phase1/config/database.yml:/var/share/jorurimail/config/database.yml:ro
      - ./docker/phase1/config/imap.yml:/var/share/jorurimail/config/imap.yml:ro
      - ./docker/phase1/config/ldap.yml:/var/share/jorurimail/config/ldap.yml:ro
      - ./docker/phase1/config/smtp.yml:/var/share/jorurimail/config/smtp.yml:ro
      - ./docker/phase1/config/sso.yml:/var/share/jorurimail/config/sso.yml:ro
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    stdin_open: true
    tty: true

  app-ubuntu26-ruby4-proxy:
    image: nginx:1.26-alpine
    platform: linux/amd64
    ports:
      - "3009:80"
    depends_on:
      - app-ubuntu26-ruby4
    volumes:
      - ./docker/nginx/phase5-ubuntu26.conf:/etc/nginx/conf.d/default.conf:ro

  app-ubuntu26-ruby4-selenium:
    image: selenium/standalone-chromium:131.0
    platform: linux/amd64
    shm_size: "2g"
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      SE_NODE_MAX_SESSIONS: "1"
      SE_NODE_SESSION_TIMEOUT: "120"

